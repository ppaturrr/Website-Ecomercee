<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecommerce Website - Shopping Cart</title>

    <!-- Link To CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Box Icons -->
    <link href="https://unpkg.com/boxicons@2.1.1/css/boxicons.min.css" rel="stylesheet">
</head>

<body>

    <!-- Header -->
    <header>
        <div class="nav container">
            <a href="#" class="logo">Ecommerce</a>

            <!-- Cart Icon -->
            <i class="bx bx-shopping-bag" id="cart-icon"></i>
            <!-- Cart -->
<div class="cart">
    <h2 class="cart-title">Your Cart</h2>

    <!-- Cart Content -->
    <div class="cart-content"></div>

    <!-- Total -->
    <div class="total">
        <div class="total-title">Total</div>
        <div class="total-price">$0</div>
    </div>

    <!-- Buy Button -->
    <button type="button" class="btn-buy">Buy Now</button>

    <!-- Close Cart -->
    <i class='bx bx-x' id="close-cart"></i>
</div>
           
                    
           
        </div>
    </header>

    <!-- Shop Section -->
    <section class="shop container">
        <h2 class="section-title">Shop Products</h2>

        <div class="shop-content">

            <!-- Product 1 -->
            <div class="product-box">
                <img src="baju1.jpg.jpg" alt="Product 1" class="product-img">
                <h2 class="product-title">Shirt</h2>
                <span class="price">$25</span>
               <i class='bx bx-shopping-bag add-cart'></i>
            </div>

            <!-- Product 2 -->
            <div class="product-box">
                <img src="jaket.jpg.jpg" alt="Product 2" class="product-img">
                <h2 class="product-title">Jacket</h2>
                <span class="price">$350</span>
                 <i class='bx bx-shopping-bag add-cart'></i>
            </div>

       
         <!-- Product 3-->
            <div class="product-box">
                <img src="chain.jpg.jpg" alt="Product 3" class="product-img">
                <h2 class="product-title">Chain</h2>
                <span class="price">$75</span>
                 <i class='bx bx-shopping-bag add-cart'></i>
            </div>
             
             <!-- Product 4-->
            <div class="product-box">
                <img src="jeans.jpg.jpg" alt="Product 4" class="product-img">
                <h2 class="product-title">Jeans Blue</h2>
                <span class="price">$300</span>
                 <i class='bx bx-shopping-bag add-cart'></i>
            </div>
             <!-- Product 5 -->
            <div class="product-box">
                <img src="gelang.jpg.jpg" alt="Product 4" class="product-img">
                <h2 class="product-title">Brachelet</h2>
                <span class="price">$75</span>
                 <i class='bx bx-shopping-bag add-cart'></i>
            </div>
             <!-- Product 5 -->
            <div class="product-box">
                <img src="kacamata.jpg.jpg" alt="Product 5" class="product-img">
                <h2 class="product-title">Frame Glasses</h2>
                <span class="price">$30</span>
                <i class='bx bx-shopping-bag add-cart'></i>
            </div>
             <!-- Product 6 -->
            <div class="product-box">
                <img src="hoodie.jpg.jpg" alt="Product 6" class="product-img">
                <h2 class="product-title">Black Hoodie</h2>
                <span class="price">$250</span>
                 <i class='bx bx-shopping-bag add-cart'></i>
            </div>
            <!-- Product 7 -->
            <div class="product-box">
                <img src="sepatu.jpg.jpg" alt="Product 7" class="product-img">
                <h2 class="product-title">White Shoes</h2>
                <span class="price">$70</span>
                 <i class='bx bx-shopping-bag add-cart'></i>
            </div>
            </div>
    </section>

</body>
<script>
let cartIcon = document.querySelector("#cart-icon");
let cart = document.querySelector(".cart");
let closeCart = document.querySelector("#close-cart");

// Open cart
cartIcon.onclick = () => {
    cart.classList.add("active");
};

// Close cart
closeCart.onclick = () => {
    cart.classList.remove("active");
};

// Add to cart
let addCartButtons = document.querySelectorAll(".add-cart");

addCartButtons.forEach(button => {
    button.addEventListener("click", addCartClicked);
});

function addCartClicked(event) {
    let button = event.target;
    let productBox = button.parentElement;

    let title = productBox.querySelector(".product-title").innerText;
    let price = productBox.querySelector(".price").innerText;
    let productImg = productBox.querySelector(".product-img").src;

    addProductToCart(title, price, productImg);
    updateTotal();
}

function addProductToCart(title, price, productImg) {
    let cartContent = document.querySelector(".cart-content");

    let cartBoxes = cartContent.querySelectorAll(".cart-product-title");
    for (let i = 0; i < cartBoxes.length; i++) {
        if (cartBoxes[i].innerText === title) {
            alert("Produk sudah ada di keranjang");
            return;
        }
    }

    let cartBox = document.createElement("div");
    cartBox.classList.add("cart-box");

    cartBox.innerHTML = `
        <img src="${productImg}" class="cart-img">
        <div class="detail-box">
            <div class="cart-product-title">${title}</div>
            <div class="cart-price">${price}</div>
            <input type="number" value="1" class="cart-quantity">
        </div>
        <i class='bx bxs-trash-alt cart-remove'></i>
    `;

    cartContent.append(cartBox);

    cartBox.querySelector(".cart-remove")
        .addEventListener("click", removeCartItem);

    cartBox.querySelector(".cart-quantity")
        .addEventListener("change", quantityChanged);
}

function removeCartItem(event) {
    let buttonClicked = event.target;
    buttonClicked.parentElement.remove();
    updateTotal();
}

function quantityChanged(event) {
    let input = event.target;
    if (isNaN(input.value) || input.value <= 0) {
        input.value = 1;
    }
    updateTotal();
}

function updateTotal() {
    let cartContent = document.querySelector(".cart-content");
    let cartBoxes = cartContent.querySelectorAll(".cart-box");
    let total = 0;

    cartBoxes.forEach(box => {
        let priceElement = box.querySelector(".cart-price");
        let quantityElement = box.querySelector(".cart-quantity");

        let price = parseFloat(priceElement.innerText.replace("$", ""));
        let quantity = quantityElement.value;

        total += price * quantity;
    });

    document.querySelector(".total-price").innerText = "$" + total;
}
</script>
<script>
// Tombol Buy Now
document.querySelector(".btn-buy").addEventListener("click", buyButtonClicked);

function buyButtonClicked() {
    let cartContent = document.querySelector(".cart-content");

    if (cartContent.children.length === 0) {
        alert("Keranjang masih kosong!");
        return;
    }

    alert("Terima kasih sudah membeli 😊");

    // Kosongkan keranjang
    while (cartContent.firstChild) {
        cartContent.removeChild(cartContent.firstChild);
    }

    updateTotal();
}
</script>
</html>
